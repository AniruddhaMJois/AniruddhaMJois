    <linearGradient id="blu" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6"/><stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
    <linearGradient id="grn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/><stop offset="100%" stop-color="#6EE7B7"/>
    </linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Main card -->
  <rect width="820" height="745" rx="18" fill="url(#bg)" stroke="#30363d" stroke-width="1.5"/>

  <!-- BG glows -->
  <circle cx="760" cy="90" r="140" fill="#6C63FF" opacity="0.04"/>
  <circle cx="60" cy="460" r="100" fill="#A78BFA" opacity="0.04"/>

  <!-- Corner dots -->
  <circle cx="746" cy="28" r="4" fill="#6C63FF" opacity="0.7" filter="url(#gl)"/>
  <circle cx="762" cy="28" r="4" fill="#8B5CF6" opacity="0.7" filter="url(#gl)"/>
  <circle cx="778" cy="28" r="4" fill="#A78BFA" opacity="0.7" filter="url(#gl)"/>

  <!-- Title -->
  <text x="38" y="52" font-family="Segoe UI, system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">🚧  Active Development Board</text>
  <line x1="38" y1="70" x2="782" y2="70" stroke="#21262d" stroke-width="1.5"/>

  <!--
    Card layout (each 88px tall, 12px gap):
    Card 1: y=82  → bottom 170
    Card 2: y=182 → bottom 270
    Card 3: y=282 → bottom 370
    Card 4: y=382 → bottom 470
    Learning: y=480

    Inside each card (card_top = T):
      Name text:     y = T+26
      Tech tag rect: y = T+35, h=18  → text y = T+48
      Progress bg:   y = T+60, h=10
      Status pill:   y = T+12, h=24  → text y = T+28
      % label:       y = T+70 (right of bar)
  -->

  <!-- === CARD 1: Gladiators NGO === -->
  <rect x="20" y="82" width="780" height="88" rx="12" fill="#161b22" stroke="#21262d" stroke-width="1"/>
  <rect x="20" y="82" width="5" height="88" rx="2.5" fill="#F59E0B"/>
  <!-- Name -->
  <text x="44" y="108" font-family="Segoe UI, system-ui, sans-serif" font-size="15" font-weight="600" fill="#ffffff">🤝  Gladiators NGO</text>
  <!-- Tech tag -->
  <rect x="44" y="116" width="132" height="20" rx="10" fill="#F59E0B" fill-opacity="0.12" stroke="#F59E0B" stroke-opacity="0.3" stroke-width="1"/>
  <text x="52" y="130" font-family="Segoe UI, system-ui, sans-serif" font-size="10" fill="#FBBF24">React  ·  Vite  ·  CSS</text>
