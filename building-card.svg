<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 745" width="820" height="745">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/><stop offset="100%" stop-color="#161b28"/>
    </linearGradient>
