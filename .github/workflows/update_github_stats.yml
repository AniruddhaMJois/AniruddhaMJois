name: Update Custom GitHub Stats

on:
  schedule:
    - cron: "0 0,12 * * *" # Runs every 12 hours
  workflow_dispatch: # Allows manual triggering

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Run script to update SVG
        run: python .github/scripts/update_stats.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add github-stats.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update custom GitHub stats SVG" && git push)
